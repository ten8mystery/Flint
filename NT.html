<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <title>Flint - Home</title>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  <style>
    :root {
      /* Main Background Gradient (slightly colder) */
      --bg-gradient-start: #141417;
      --bg-gradient-end: #09090b;
      
      /* Panels and Elements (darker grey) */
      --panel-bg: rgba(24, 24, 27, 0.6);
      --panel-hover: rgba(39, 39, 42, 0.8);
      
      /* Typography */
      --text: #fafafa;
      --text-soft: #a1a1aa;
      
      /* --- THEMATIC COLOR CHANGE --- */
      /* Old Gold: #e2c044 -> New Colder Grey: #d1d5db (grey-300) */
      --accent: #d1d5db; 
      
      /* Specific UI colors */
      --discord: #5865F2;
      --border-light: rgba(255, 255, 255, 0.04);
      --border-hover: rgba(255, 255, 255, 0.12);
      --shadow-soft: 0 16px 40px rgba(0, 0, 0, 0.5);
      --danger: #ef4444;
    }

    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
      font-family: 'Inter', sans-serif;
    }

    body {
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      background: radial-gradient(circle at top, var(--bg-gradient-start), var(--bg-gradient-end) 80%) no-repeat fixed;
      color: var(--text);
      overflow-x: hidden;
    }

    .main-container {
      flex: 1;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      width: 100%;
      max-width: 700px;
      padding: 20px;
      z-index: 10;
      transform: translateY(-5vh);
    }

    #particles {
      position: fixed;
      inset: 0;
      z-index: -1;
      pointer-events: none;
    }

    /* --- MODAL (POPUP) --- */
    .modal-overlay {
      position: fixed;
      inset: 0;
      background: rgba(0, 0, 0, 0.8);
      backdrop-filter: blur(8px);
      display: flex;
      align-items: center;
      justify-content: center;
      z-index: 1000;
      opacity: 0;
      visibility: hidden;
      transition: all 0.4s ease;
    }

    .modal-overlay.active {
      opacity: 1;
      visibility: visible;
    }

    .modal-content {
      background: var(--panel-bg);
      border: 1px solid var(--border-light);
      padding: 40px;
      border-radius: 32px;
      text-align: center;
      max-width: 400px;
      width: 90%;
      box-shadow: var(--shadow-soft);
      transform: scale(0.9);
      transition: transform 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
    }

    .modal-overlay.active .modal-content {
      transform: scale(1);
    }

    .modal-title {
      font-size: 2rem;
      margin-bottom: 12px;
      font-weight: 700;
    }

    .discord-btn {
      display: inline-flex;
      align-items: center;
      gap: 10px;
      background: var(--discord);
      color: white;
      text-decoration: none;
      padding: 14px 28px;
      border-radius: 16px;
      font-weight: 600;
      margin-top: 20px;
      transition: transform 0.2s;
    }

    .discord-btn:hover {
      transform: translateY(-2px);
      filter: brightness(1.1);
    }

    /* --- BEAUTIFIED MODAL CHECKBOX --- */
    .modal-opt-out {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 12px;
      margin-top: 25px;
      cursor: pointer;
      user-select: none;
    }

    /* Visually hide the native checkbox */
    .modal-opt-out input {
      display: none;
    }

    /* Style the custom checkbox box */
    .custom-checkbox {
      width: 20px;
      height: 20px;
      border: 1px solid var(--border-light);
      border-radius: 6px;
      background: rgba(255, 255, 255, 0.02);
      display: flex;
      align-items: center;
      justify-content: center;
      transition: all 0.3s ease;
    }

    /* Style the check icon (initially hidden) */
    .custom-checkbox i {
      color: #111; /* Dark icon for contrast against grey */
      font-size: 11px;
      opacity: 0;
      transform: scale(0.5);
      transition: all 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275);
    }

    /* Interaction State: Checkbox Hover */
    .modal-opt-out:hover .custom-checkbox {
      border-color: var(--border-hover);
      background: rgba(255, 255, 255, 0.05);
    }

    /* Checked State: Box fills with Accent color (The Grey) */
    .modal-opt-out input:checked + .custom-checkbox {
      background: var(--accent);
      border-color: var(--accent);
    }

    /* Checked State: Icon appears */
    .modal-opt-out input:checked + .custom-checkbox i {
      opacity: 1;
      transform: scale(1);
    }

    .modal-opt-label {
      font-size: 0.85rem;
      color: var(--text-soft);
      transition: color 0.3s ease;
    }

    .modal-opt-out:hover .modal-opt-label {
      color: var(--text);
    }

    .close-modal {
      display: block;
      margin-top: 15px;
      color: var(--text-soft);
      cursor: pointer;
      font-size: 0.9rem;
      text-decoration: underline;
      transition: color 0.2s;
    }

    .close-modal:hover {
      color: var(--accent); /* Now highlights grey */
    }

    /* --- MAIN UI --- */
    .title-section {
      display: flex;
      flex-direction: column;
      align-items: center;
      margin-bottom: 2.5rem;
      gap: 4px;
    }

    .title {
      font-size: 3.2rem;
      font-weight: 700;
      letter-spacing: -0.02em;
    }

    .subtitle {
      font-size: 1.05rem;
      color: var(--text-soft);
    }

    .search-card {
      width: 100%;
      max-width: 540px;
      margin-bottom: 3.5rem;
      border-radius: 40px;
      background: var(--panel-bg);
      backdrop-filter: blur(16px);
      border: 1px solid var(--border-light);
      box-shadow: var(--shadow-soft);
      transition: all 0.3s ease;
    }

    .search-box {
      display: flex;
      align-items: center;
      gap: 12px;
      padding: 10px 12px 10px 24px;
    }

    .search-box input {
      flex: 1;
      background: transparent;
      border: none;
      outline: none;
      color: var(--text);
      font-size: 1.1rem;
    }

    .search-box select {
      background: rgba(255, 255, 255, 0.03);
      color: var(--text-soft);
      border: 1px solid var(--border-light);
      border-radius: 24px;
      padding: 8px 14px;
      cursor: pointer;
    }

    .shortcuts {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(75px, 1fr));
      gap: 16px 16px;
      width: 100%;
    }

    .shortcut {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 6px;
      cursor: pointer;
      text-decoration: none;
      transition: transform 0.2s ease;
    }

    .shortcut-icon {
      width: 54px;
      height: 54px;
      border-radius: 20px;
      background: var(--panel-bg);
      backdrop-filter: blur(12px);
      border: 1px solid var(--border-light);
      display: flex;
      align-items: center;
      justify-content: center;
      transition: all 0.3s ease;
    }

    .shortcut:hover .shortcut-icon {
      border-color: var(--border-hover);
      transform: translateY(-5px);
    }

    .shortcut-icon img {
      width: 20px;
      height: 20px;
      filter: brightness(0) invert(1);
    }

    .shortcut-icon i {
      color: #ffffff;
      font-size: 16px;
    }

    .shortcut-label {
      font-size: 0.85rem;
      color: var(--text-soft);
    }

    .loader {
      position: fixed;
      inset: 0;
      background: rgba(13, 13, 18, 0.95);
      display: none;
      align-items: center;
      justify-content: center;
      z-index: 100;
    }

    .loader.show { display: flex; }

    .spinner {
      width: 40px;
      height: 40px;
      border: 3px solid rgba(255, 255, 255, 0.1);
      border-top-color: #ffffff;
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
    }
    
    /* --- FOOTER --- */
    footer {
      width: 100%;
      margin-top: auto; 
      padding: 15px 30px;
      display: flex;
      justify-content: space-between;
      align-items: center;
      border-top: 1px solid var(--border-light);
      background: rgba(13, 13, 18, 0.1); /* Lighter footer bg */
      backdrop-filter: blur(8px);
      z-index: 10;
    }

    .footer-left, .footer-right {
      display: flex;
      align-items: center;
      gap: 20px;
    }

    .footer-link, .copyright {
      color: rgba(161, 161, 170, 0.3); /* Even more faded */
      text-decoration: none;
      font-size: 0.75rem;
      transition: color 0.2s ease, opacity 0.2s ease;
    }

    .footer-link:hover {
      color: var(--text);
    }

    /* --- BEAUTIFIED RESET SITE DATA BUTTON --- */
    #resetDataBtn {
      color: rgba(239, 68, 68, 0.3); /* Subtle danger */
      display: flex;
      align-items: center;
      gap: 6px;
      cursor: pointer;
      font-weight: 500;
      user-select: none;
    }

    #resetDataBtn:hover {
      color: #ef4444; /* Standard red on hover */
      opacity: 1;
    }

    .status-indicator {
      display: flex;
      align-items: center;
      gap: 6px;
      font-size: 0.7rem;
      color: rgba(161, 161, 170, 0.4);
    }

    .status-dot {
      width: 6px;
      height: 6px;
      background: #34d399; /* Green, but slightly less intense */
      border-radius: 50%;
    }

    .copyright {
      font-size: 0.8rem;
      color: rgba(161, 161, 170, 0.3);
    }

    @keyframes spin { to { transform: rotate(360deg); } }
  </style>
</head>

<body>
  <canvas id="particles"></canvas>
  <div class="loader" id="loader"><div class="spinner"></div></div>

  <div class="modal-overlay" id="welcomeModal">
    <div class="modal-content">
      <h2 class="modal-title">Welcome to Flint</h2>
      <p style="color: var(--text-soft)">Join our community to stay updated and share your feedback.</p>
      <a href="https://discord.gg/YbbNPD8YDm" target="_blank" class="discord-btn">
        <i class="fa-brands fa-discord"></i> Join the Discord
      </a>
      
      <label class="modal-opt-out" for="neverShowAgain">
        <input type="checkbox" id="neverShowAgain">
        <div class="custom-checkbox">
          <i class="fa-solid fa-check"></i>
        </div>
        <span class="modal-opt-label">Don't show this again</span>
      </label>

      <span class="close-modal" id="closeModal">Continue to Dashboard</span>
    </div>
  </div>

  <div class="main-container">
    <div class="title-section">
      <h1 class="title">Flint</h1>
      <div class="subtitle">Welcome to Flint.</div>
    </div>

    <div class="search-card">
      <form class="search-box" id="searchForm">
        <i class="fa-solid fa-magnifying-glass"></i>
        <input type="text" id="searchInput" placeholder="Search the web..." required autocomplete="off">
        <select id="engine">
          <option value="https://search.brave.com/search?q=">Brave</option>
          <option value="https://duckduckgo.com/?q=">DuckDuckGo</option>
          <option value="https://www.google.com/search?q=">Google</option>
        </select>
      </form>
    </div>
    
    <div class="shortcuts" id="shortcuts">
      <a class="shortcut" href="/pages/g.html">
        <div class="shortcut-icon"><i class="fa-solid fa-gamepad"></i></div>
        <span class="shortcut-label">Games</span>
      </a>
      
      <a class="shortcut" href="/pages/a.html">
        <div class="shortcut-icon"><i class="fa-solid fa-folder"></i></div>
        <span class="shortcut-label">Apps</span>
      </a>

      <a class="shortcut" data-url="https://youtube.com">
        <div class="shortcut-icon"><img src="https://cdn.jsdelivr.net/gh/simple-icons/simple-icons/icons/youtube.svg"></div>
        <span class="shortcut-label">YouTube</span>
      </a>

      <a class="shortcut" data-url="https://discord.com">
        <div class="shortcut-icon"><img src="https://cdn.jsdelivr.net/gh/simple-icons/simple-icons/icons/discord.svg"></div>
        <span class="shortcut-label">Discord</span>
      </a>
      
      <a class="shortcut" data-url="https://open.spotify.com">
        <div class="shortcut-icon"><img src="https://cdn.jsdelivr.net/gh/simple-icons/simple-icons/icons/spotify.svg"></div>
        <span class="shortcut-label">Spotify</span>
      </a>

      <div class="shortcut" id="addShortcut">
        <div class="shortcut-icon"><i class="fa-solid fa-plus"></i></div>
        <span class="shortcut-label">Add</span>
      </div>
    </div>
  </div>
  
  <footer>
    <div class="footer-left">
      <span class="copyright">© 2026 Flint</span>
      <a href="#" class="footer-link">DMCA</a>
      <a href="https://github.com" class="footer-link"><i class="fa-brands fa-github"></i></a>
      
      <a href="#" class="footer-link" id="resetDataBtn">
        <i class="fa-solid fa-trash-can" style="font-size: 0.7rem;"></i> Reset Site Data
      </a>
    </div>
    
    <div class="footer-right">
      <div class="status-indicator">
        <div class="status-dot"></div>
        <span>Everything Working</span>
      </div>
    </div>
  </footer>
  
  <script>
    const $ = s => document.querySelector(s);

    // POPUP LOGIC
    window.onload = () => {
      if (localStorage.getItem('hideWelcomeModal') !== 'true') {
        $('#welcomeModal').classList.add('active');
      }
    };

    $('#closeModal').onclick = () => {
      if ($('#neverShowAgain').checked) {
        localStorage.setItem('hideWelcomeModal', 'true');
      }
      $('#welcomeModal').classList.remove('active');
    };

    // RESET DATA LOGIC
    $('#resetDataBtn').onclick = (e) => {
      e.preventDefault();
      if (confirm("Are you sure you want to reset all site data? This will clear your custom shortcuts and modal preferences.")) {
        localStorage.clear();
        location.reload();
      }
    };

    const nav = url => {
      $('#loader').classList.add('show');
      window.parent?.postMessage({ type: 'navigate', url }, '*');
    };

    // SEARCH
    $('#searchForm').onsubmit = e => {
      e.preventDefault();
      const q = $('#searchInput').value.trim();
      if (q) nav($('#engine').value + encodeURIComponent(q));
    };

    // SHORTCUTS
    $('#shortcuts').onclick = e => {
      const shortcut = e.target.closest('.shortcut');
      if (!shortcut) return;

      if (shortcut.id === 'addShortcut') {
        const name = prompt("Shortcut name:");
        if (!name) return;
        let url = prompt("URL:");
        if (!url) return;
        if (!url.startsWith('http') && !url.startsWith('/')) url = 'https://' + url;

        const shortcuts = JSON.parse(localStorage.getItem('shortcuts') || '[]');
        shortcuts.push({ name, url });
        localStorage.setItem('shortcuts', JSON.stringify(shortcuts));
        renderCustom();
      } else {
        const url = shortcut.dataset.url;
        if (url) {
          e.preventDefault();
          nav(url);
        }
      }
    };

    function renderCustom() {
      document.querySelectorAll('.custom-shortcut').forEach(e => e.remove());
      const shortcuts = JSON.parse(localStorage.getItem('shortcuts') || '[]');
      shortcuts.forEach(s => {
        const div = document.createElement('div');
        div.className = 'shortcut custom-shortcut';
        div.dataset.url = s.url;
        div.innerHTML = `<div class="shortcut-icon"><i class="fa-solid fa-link"></i></div><span class="shortcut-label">${s.name}</span>`;
        $('#addShortcut').before(div);
      });
    }

    renderCustom();

    // PARTICLES (Flint Style)
    const canvas = document.getElementById("particles");
    const ctx = canvas.getContext("2d");
    function resize() { canvas.width = window.innerWidth; canvas.height = window.innerHeight; }
    resize();
    window.onresize = resize;
    let particles = [];
    class Particle {
      constructor() { this.reset(); }
      reset() {
        this.x = Math.random() * canvas.width;
        this.y = Math.random() * canvas.height;
        this.size = Math.random() * 2 + 1;
        this.vx = (Math.random() - 0.5) * 0.4;
        this.vy = (Math.random() - 0.5) * 0.4;
        this.alpha = 0.1 + Math.random() * 0.2;
      }
      update() {
        this.x += this.vx; this.y += this.vy;
        if (this.x < 0 || this.x > canvas.width || this.y < 0 || this.y > canvas.height) this.reset();
      }
      draw() {
        ctx.beginPath(); ctx.arc(this.x, this.y, this.size, 0, Math.PI * 2);
        ctx.fillStyle = `rgba(255, 255, 255, ${this.alpha})`;
        ctx.fill();
      }
    }
    for (let i = 0; i < 50; i++) particles.push(new Particle());
    function animate() {
      ctx.clearRect(0, 0, canvas.width, canvas.height);
      particles.forEach(p => { p.update(); p.draw(); });
      requestAnimationFrame(animate);
    }
    animate();
  </script>
</body>
</html>
