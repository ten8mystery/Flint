<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <title>Flint - 404</title>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg-gradient-start: #1a1a20;
      --bg-gradient-end: #0d0d12;
      --panel-bg: rgba(30, 30, 36, 0.6);
      --panel-hover: rgba(45, 45, 55, 0.8);
      --text: #ffffff;
      --text-soft: #a1a1aa;
      --accent: #e2c044;
      --discord: #5865F2;
      --border-light: rgba(255, 255, 255, 0.06);
      --border-hover: rgba(255, 255, 255, 0.15);
      --shadow-soft: 0 16px 40px rgba(0, 0, 0, 0.4);
    }

    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
      font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
    }

    body::before {
      content: "";
      position: fixed;
      inset: 0;
      background: radial-gradient(circle at top, var(--bg-gradient-start), var(--bg-gradient-end) 80%);
      z-index: -2;
      pointer-events: none;
    }

    body {
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: flex-start;
      color: var(--text);
      overflow-x: hidden;
      overflow-y: auto;
      background-color: var(--bg-gradient-end); /* Fallback color */
    }

    #particles {
      position: fixed;
      inset: 0;
      z-index: -1;
      pointer-events: none;
    }

    .loader {
      position: fixed;
      inset: 0;
      background: rgba(13, 13, 18, 0.9);
      display: none;
      align-items: center;
      justify-content: center;
      z-index: 2000;
    }

    .loader.show { display: flex; }

    .spinner {
      width: 40px;
      height: 40px;
      border: 3px solid rgba(255,255,255,0.1);
      border-top-color: #ffffff;
      border-radius: 50%;
      animation: spin 0.8s linear infinite;    
    }

    @keyframes spin { to { transform: rotate(360deg); } }

    .main-container {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      width: 100%;
      max-width: 900px;
      padding: 60px 20px;
      z-index: 10;
      min-height: 100vh
    }



    .title {
    animation: skibiditoiletfloat 3s ease-in-out infinite;
      font-size: 10rem;
      font-weight: 700;
      letter-spacing: -0em;
      text-shadow: 0 4px 20px rgba(0, 0, 0, 0.3);
    }

    .subtitle {
      font-size: 1.5rem;
      color: var(--text-soft);
    }

    .title-section {
        
      text-align: center;
      margin-bottom: 2rem;
    }

    .home-button {
      display: inline-block;
      padding: 14px 36px;
      background-color: #222222;
      color: #fff; /* Dark text on light gold */
      text-decoration: none;
      font-weight: 700;
      border-radius: 12px;
      transition: all 0.3s transform ease;
      text-transform: uppercase;
      letter-spacing: 1px;
      transition: all 0.2s ease-in;
    }

    .home-button:hover {
      transform: translateY(-3px);
      filter: brightness(1.1);
    }
    
    @keyframes skibiditoiletfloat {
  0% {
    transform: translateY(0px);
  }
  50% {
    transform: translateY(-5px); 
  }
  100% {
    transform: translateY(0px); 
  }
}

  </style>
</head>

<body>
  <canvas id="particles"></canvas>
  <div class="loader" id="loader"><div class="spinner"></div></div>

<div class="main-container">
    <div class="title-section">
      <h1 class="title">404</h1>
      <h1 class="subtitle">Page not found!</h1>
    </div>
    
    <a href="/" class="home-button">
      <i class="fas fa-home" style="margin-right: 8px;"></i> Back to Home
    </a>
  </div>

  <script>
    const canvas = document.getElementById("particles");
    const ctx = canvas.getContext("2d");
    function resize() { 
        canvas.width = window.innerWidth; 
        canvas.height = window.innerHeight; 
    }
    resize();
    window.onresize = resize;

    let particles = [];
    class Particle {
      constructor() {
        this.x = Math.random() * canvas.width;
        this.y = Math.random() * canvas.height;
        this.size = Math.random() * 2 + 1;
        this.vx = (Math.random() - 0.5) * 0.4;
        this.vy = (Math.random() - 0.5) * 0.4;
        this.alpha = 0.1 + Math.random() * 0.2;
      }
      update() {
        this.x += this.vx; this.y += this.vy;
        if (this.x < 0 || this.x > canvas.width) this.vx *= -1;
        if (this.y < 0 || this.y > canvas.height) this.vy *= -1;
      }
      draw() {
        ctx.beginPath(); ctx.arc(this.x, this.y, this.size, 0, Math.PI * 2);
        ctx.fillStyle = `rgba(255, 255, 255, ${this.alpha})`;
        ctx.fill();
      }
    }
    for (let i = 0; i < 50; i++) particles.push(new Particle());
    function animate() {
      ctx.clearRect(0, 0, canvas.width, canvas.height);
      particles.forEach(p => { p.update(); p.draw(); });
      requestAnimationFrame(animate);
    }
    animate();
    
    window.addEventListener('resize', () => {
        canvas.width = window.innerWidth;
        canvas.height = window.innerHeight;
        // Re-fill particles so they don't disappear on resize
        particles = [];
        for (let i = 0; i < 50; i++) particles.push(new Particle());
    });

    window.onload = () => {
        document.getElementById('loader').style.display = 'none';
    };
  </script>
</body>
</html>
