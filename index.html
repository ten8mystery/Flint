<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Flint</title>
    <link rel="icon" type="image/x-icon" href="images/favicon.ico">
    <style>
        body, html { margin: 0; padding: 0; height: 100%; width: 100%; overflow: hidden; background: #111; color: white; font-family: sans-serif; }
        iframe { border: none; width: 100%; height: 100%; }

        #blocker-notice {
            display: none; /* Hidden by default */
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0, 0, 0, 0.9);
            z-index: 99999;
            flex-direction: column; align-items: center; justify-content: center;
            text-align: center; padding: 20px;
        }
        .popup-box { background: #222; padding: 30px; border-radius: 12px; border: 1px solid #444; max-width: 400px; }
        .btn { background: #4a90e2; color: white; border: none; padding: 12px 24px; border-radius: 6px; cursor: pointer; font-size: 16px; margin-top: 20px; }
        .btn:hover { background: #357abd; }
    </style>
</head>
<body>

    <div id="blocker-notice">
        <div class="popup-box">
            <h2>Launch Flint</h2>
            <p>Your browser blocked the automatic <b>about:blank</b> cloak. Click below to launch Flint in a hidden tab.</p>
            <button class="btn" onclick="createCloak()">Launch Flint</button>
        </div>
    </div>

    <iframe id="main-frame" src="window.html" sandbox="allow-scripts allow-forms allow-same-origin"></iframe>

    <script>
        function createCloak() {
            const win = window.open('about:blank', '_blank');
            
            if (!win) {
                // If we reach here, the click failed or auto-run failed
                document.getElementById('blocker-notice').style.display = 'flex';
                return false;
            }

            // Set disguise
            win.document.title = 'Google Drive';
            const link = win.document.createElement('link');
            link.rel = 'icon';
            link.href = 'https://ssl.gstatic.com/images/branding/product/1x/drive_2020q4_32dp.png';
            win.document.head.appendChild(link);

            // Inject Iframe
            const iframe = win.document.createElement('iframe');
            iframe.src = window.location.href + "?cloaked=true"; // Flag to stop loops
            iframe.style.cssText = "position:fixed;top:0;left:0;bottom:0;right:0;width:100%;height:100%;border:none;margin:0;padding:0;overflow:hidden;z-index:999999;";
            
            win.document.body.appendChild(iframe);

            // Redirect original tab
            window.location.replace('https://classroom.google.com');
            return true;
        }

        // Logic to run on page load
        window.onload = function() {
            const urlParams = new URLSearchParams(window.location.search);
            
            // If the URL DOES NOT have "?cloaked=true", try to cloak it
            if (!urlParams.has('cloaked')) {
                const success = createCloak();
                if (!success) {
                    // Hide the main frame so they don't see the site until they click
                    document.getElementById('main-frame').style.display = 'none';
                    document.getElementById('blocker-notice').style.display = 'flex';
                }
            }
        };
    </script>
</body>
</html>
