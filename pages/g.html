<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <title>Flint - Games</title>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg-gradient-start: #1a1a20;
      --bg-gradient-end: #0d0d12;
      --panel-bg: rgba(30, 30, 36, 0.6);
      --panel-hover: rgba(45, 45, 55, 0.8);
      --text: #fdfdfd;
      --text-soft: #a1a1aa;
      --accent: #e2c044;
      --discord: #5865F2;
      --border-light: rgba(255, 255, 255, 0.06);
      --border-hover: rgba(255, 255, 255, 0.15);
      --shadow-soft: 0 16px 40px rgba(0, 0, 0, 0.4);
    }

    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
      font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
    }

    body::before {
      content: "";
      position: fixed;
      inset: 0;
      background: radial-gradient(circle at top, var(--bg-gradient-start), var(--bg-gradient-end) 80%);
      z-index: -2;
      pointer-events: none;
    }

    body {
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: flex-start;
      color: var(--text);
      overflow-x: hidden;
      overflow-y: auto;
      background-color: var(--bg-gradient-end); /* Fallback color */
    }

    #particles {
      position: fixed;
      inset: 0;
      z-index: -1;
      pointer-events: none;
    }

    .loader {
      position: fixed;
      inset: 0;
      background: rgba(13, 13, 18, 0.9);
      display: none;
      align-items: center;
      justify-content: center;
      z-index: 2000;
    }

    .loader.show { display: flex; }

    .spinner {
      width: 40px;
      height: 40px;
      border: 3px solid rgba(255,255,255,0.1);
      border-top-color: #ffffff;
      border-radius: 50%;
      animation: spin 0.8s linear infinite;    
    }

    @keyframes spin { to { transform: rotate(360deg); } }

    .main-container {
      display: flex;
      flex-direction: column;
      align-items: center;
      width: 100%;
      max-width: 900px;
      padding: 60px 20px;
      z-index: 10;
    }

    .title-section {
      display: flex;
      flex-direction: column;
      align-items: center;
      margin-bottom: 2.5rem;
      gap: 6px;
    }

    .title {
      font-size: 3.2rem;
      font-weight: 700;
      letter-spacing: -0.02em;
      text-shadow: 0 4px 20px rgba(0, 0, 0, 0.3);
    }

    .subtitle {
      font-size: 1.05rem;
      color: var(--text-soft);
    }

    .search-card {
      width: 100%;
      max-width: 540px;
      margin-bottom: 3.5rem;
      border-radius: 40px;
      background: var(--panel-bg);
      backdrop-filter: blur(16px);
      border: 1px solid var(--border-light);
      box-shadow: var(--shadow-soft);
      transition: all 0.3s ease;
    }

    .search-card:focus-within {
      border-color: var(--border-hover);
      transform: translateY(-2px);
    }

    .search-box {
      display: flex;
      align-items: center;
      gap: 12px;
      padding: 10px 12px 10px 24px;
    }

    .search-box input {
      flex: 1;
      background: transparent;
      border: none;
      outline: none;
      color: var(--text);
      font-size: 1.1rem;
      padding: 6px 0;
    }

    .shortcuts {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(110px, 1fr));
      gap: 32px 20px;
      width: 100%;
    }

    .shortcut {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 12px;
      cursor: pointer;
      text-decoration: none;
      transition: transform 0.2s ease;
    }

    .shortcut:hover {
      transform: translateY(-5px);
    }

    .shortcut-icon {
      width: 100px;
      height: 100px;
      border-radius: 24px;
      background: var(--panel-bg);
      backdrop-filter: blur(1);
      border: 1px solid var(--border-light);
      display: flex;
      align-items: center;
      justify-content: center;
      transition: all 0.3s ease;
      overflow: hidden;
      box-shadow: 0 4px 15px rgba(0,0,0,0.2);
    }

    .shortcut-icon img {
      width: 100%;
      height: 100%;
      object-fit: cover;
    }

    .shortcut-label {
      font-size: 0.85rem;
      color: var(--text-soft);
      font-weight: 500;
      text-align: center;
      width: 100%;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .iframe-overlay {
      display: none;
      position: fixed;
      inset: 0;
      background: rgba(13, 13, 18, 0.95);
      backdrop-filter: blur(10px);
      z-index: 1000;
      justify-content: center;
      align-items: center;
    }

    .iframe-controls {
      position: absolute;
      top: 25px;
      left: 50%;
      transform: translateX(-50%);
      display: flex;
      gap: 16px;
      z-index: 1010;
    }

    .iframe-controls button {
      background: var(--panel-bg);
      border: 1px solid var(--border-light);
      color: var(--text);
      padding: 10px 24px;
      border-radius: 14px;
      font-weight: 600;
      cursor: pointer;
      backdrop-filter: blur(10px);
      transition: all 0.2s ease;
    }

    .iframe-controls button:hover {
      background: var(--panel-hover);
      transform: scale(1.05);
    }

    #iframeContainer {
      width: 95vw;
      height: 85vh;
      margin-top: 50px;
      display: flex;
      justify-content: center;
      align-items: center;
    }

    #iframeContainer iframe {
      width: 100%;
      height: 100%;
      border: 1px solid var(--border-light);
      border-radius: 20px;
      background: #000;
      box-shadow: var(--shadow-soft);
    }

    .shortcut {
  content-visibility: auto;
  contain-intrinsic-size: 140px;
}
  </style>
</head>

<body>
  <canvas id="particles"></canvas>
  <div class="loader" id="loader"><div class="spinner"></div></div>

  <div class="main-container">
    <div class="title-section">
      <h1 class="title">Games</h1>
      <div class="subtitle"></div>
    </div>

    <div class="search-card">
      <form class="search-box" id="searchForm" autocomplete="off" onsubmit="event.preventDefault();">
        <i class="fa-solid fa-magnifying-glass"></i>
        <input type="text" id="searchInput" placeholder="Search games..." autocomplete="off">
      </form>
    </div>

    <div class="shortcuts" id="gameList"></div>
  </div>

  <div class="iframe-overlay" id="iframeOverlay">
    <div class="iframe-controls">
      <button id="closeBtn"><i class="fa-solid fa-xmark"></i> Close</button>
      <button id="fullscreenBtn"><i class="fa-solid fa-expand"></i> Fullscreen</button>
    </div>
    <div id="iframeContainer"></div>
  </div>

<script>
const $ = s => document.querySelector(s);

const searchInput = $('#searchInput');
const gameList = $('#gameList');
const overlay = $('#iframeOverlay');
const closeBtn = $('#closeBtn');
const fullscreenBtn = $('#fullscreenBtn');
const iframeContainer = $('#iframeContainer');

let allGames = [];
let renderedStart = 0;
const BATCH_SIZE = 65;
let currentIframe = null;

function createFreshIframe() {
  iframeContainer.innerHTML = '';
  const iframe = document.createElement('iframe');
  iframe.allow = 'autoplay; fullscreen; gamepad; accelerometer; gyroscope; pointer-lock; microphone';
  iframeContainer.appendChild(iframe);
  currentIframe = iframe;
  return iframe;
}

const priorityGames = ["[!] REQUEST GAME", "", ""];

fetch('https://raw.githubusercontent.com/ten8mystery/Flint/main/data/games.json')
  .then(res => res.json())
  .then(data => {
    data.sort((a, b) => {
      const ai = priorityGames.indexOf(a.name);
      const bi = priorityGames.indexOf(b.name);
      if (ai !== -1 && bi !== -1) return ai - bi;
      if (ai !== -1) return -1;
      if (bi !== -1) return 1;
      return a.name.localeCompare(b.name);
    });

    allGames = data;

    renderBatch(true);
  });

window.addEventListener('scroll', () => {
  const nearBottom = window.innerHeight + window.scrollY >= document.body.offsetHeight - 500;

  // Only load more batches if the search bar is empty
  if (nearBottom && searchInput.value.trim() === '') {
    renderBatch();
  }
});

function appendGame(game) {
  const a = document.createElement('a');
  a.className = 'shortcut';
  a.dataset.name = game.name;

  a.innerHTML = `
    <div class="shortcut-icon">
      <img loading="lazy"
      src="${game.image}"
      onerror="this.src='https://via.placeholder.com/100?text=?'">
    </div>
    <span class="shortcut-label">${game.name}</span>
  `;

  a.addEventListener('click', e => {
    e.preventDefault();

    $('#loader').classList.add('show');
    overlay.style.display = 'flex';

    const iframe = createFreshIframe();

    if (game.description === "iframe") {
      iframe.src = game.src;
      iframe.onload = () => $('#loader').classList.remove('show');
    } else {
      fetch(game.src)
        .then(r => r.text())
        .then(html => {
          const doc = iframe.contentDocument || iframe.contentWindow.document;
          doc.open();
          doc.write(html);
          doc.close();
          $('#loader').classList.remove('show');
        });
    }
  });

  gameList.appendChild(a);
}

function renderBatch(reset = false) {
  if (reset) {
    gameList.innerHTML = '';
    renderedStart = 0;
  }

  const end = renderedStart + BATCH_SIZE;
  const slice = allGames.slice(renderedStart, end);

  slice.forEach(appendGame);
  renderedStart += BATCH_SIZE;
}

searchInput.addEventListener('input', () => {
  const q = searchInput.value.toLowerCase().trim();

  // If search is cleared, reset to standard batch rendering
  if (q === '') {
    renderBatch(true);
    return;
  }

  const filteredGames = allGames.filter(game => 
    game.name.toLowerCase().includes(q)
  );

  gameList.innerHTML = '';
  filteredGames.forEach(appendGame);
});

closeBtn.onclick = () => {
  overlay.style.display = 'none';
  if (currentIframe) currentIframe.src = 'about:blank';
  iframeContainer.innerHTML = '';
  currentIframe = null;
  resize(); // Assuming this is for your canvas particles
};

fullscreenBtn.onclick = () => {
  if (!currentIframe) return;
  currentIframe.requestFullscreen?.();
};
</script>

  <script>
    const canvas = document.getElementById("particles");
    const ctx = canvas.getContext("2d");
    function resize() { 
        canvas.width = window.innerWidth; 
        canvas.height = window.innerHeight; 
    }
    resize();
    window.onresize = resize;

    let particles = [];
    class Particle {
      constructor() {
        this.x = Math.random() * canvas.width;
        this.y = Math.random() * canvas.height;
        this.size = Math.random() * 2 + 1;
        this.vx = (Math.random() - 0.5) * 0.4;
        this.vy = (Math.random() - 0.5) * 0.4;
        this.alpha = 0.1 + Math.random() * 0.2;
      }
      update() {
        this.x += this.vx; this.y += this.vy;
        if (this.x < 0 || this.x > canvas.width) this.vx *= -1;
        if (this.y < 0 || this.y > canvas.height) this.vy *= -1;
      }
      draw() {
        ctx.beginPath(); ctx.arc(this.x, this.y, this.size, 0, Math.PI * 2);
        ctx.fillStyle = `rgba(255, 255, 255, ${this.alpha})`;
        ctx.fill();
      }
    }
    for (let i = 0; i < 50; i++) particles.push(new Particle());
    function animate() {
      ctx.clearRect(0, 0, canvas.width, canvas.height);
      particles.forEach(p => { p.update(); p.draw(); });
      requestAnimationFrame(animate);
    }
    animate();
  </script>
</body>
</html>
